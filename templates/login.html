<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in to Cosmo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="navbar-avatar">C</div>
                <span>Cosmo</span>
            </div>

            <h1 class="auth-title">Sign in to Cosmo</h1>
            <p class="auth-subtitle">Use your username and password to continue.</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                {% for message in messages %}
                  <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="post" novalidate>
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign in</button>
            </form>

            <div class="auth-footer">
                Need an account? <a href="{{ url_for('signup') }}">Create one.</a>
            </div>
        </div>
    </div>
</body>
</html>
