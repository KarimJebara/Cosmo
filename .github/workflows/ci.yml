name: CI

on:
  push:
    branches: [main, cosmo-v1]
  pull_request:
    branches: [main, cosmo-v1]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest --tb=short -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: cosmo:ci

      - name: Smoke-run container
        run: |
          docker run -d --name cosmo-ci \
            -e SECRET_KEY=ci-test-only \
            -p 5002:5002 cosmo:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5002/healthz; then
              echo " ok"; exit 0
            fi
            sleep 1
          done
          echo "healthz never came up"
          docker logs cosmo-ci
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f cosmo-ci || true
